workflows:
  capacitor-android:
    name: Build Android
    max_build_duration: 60
    environment:
      node: latest
    scripts:
      - npm install
      - npm run build
      - npx cap sync android
      - cd android
      - ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk

  capacitor-ios:
    name: Build iOS
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath build/App.xcarchive
    artifacts:
      - ios/App/build/**/*.xcarchive
      - ios/App/build/**/*.ipa
