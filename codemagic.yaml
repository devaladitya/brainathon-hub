workflows:
  capacitor-ios:
    name: Build iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - BrainathonHub_AppStore
        certificates:
          - BrainathonHub Distribution
      vars:
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Force correct app icon
        script: |
          # Resize source icon to 1024x1024 for iOS AppIcon
          cp resources/icon.png /tmp/AppIcon-512@2x.png
          sips -z 1024 1024 /tmp/AppIcon-512@2x.png
          # Overwrite whatever cap sync put there
          cp -f /tmp/AppIcon-512@2x.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          # Ensure Contents.json is correct
          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'ICONJSON'
          {
            "images": [
              {
                "idiom": "universal",
                "size": "1024x1024",
                "filename": "AppIcon-512@2x.png",
                "platform": "ios"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          ICONJSON
          echo "=== Icon verification ==="
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/
          md5 ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          md5 resources/icon.png
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - devalwork07@gmail.com
        notify:
          success: true
          failure: true
