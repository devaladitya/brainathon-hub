workflows:
  capacitor-ios:
    name: Build iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: BrainathonHub AppStore
    environment:
      node: 18
      xcode: latest
      ios_signing:
        distribution_type: app_store 
        bundle_identifier: app.knobly.brainathonhub
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - devalwork07@gmail.com
        notify:
          success: true
          failure: true
