workflows:
  capacitor-ios:
    name: Build iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - BrainathonHub_AppStore
        certificates:
          - BrainathonHub Distribution
      vars:
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Force correct app icon (no alpha)
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          # Resize to 1024x1024
          cp resources/icon.png /tmp/icon_src.png
          sips -z 1024 1024 /tmp/icon_src.png
          # Convert to JPEG (removes alpha/transparency, white background)
          sips -s format jpeg -s formatOptions 100 /tmp/icon_src.png --out /tmp/icon_noalpha.jpg
          # Convert back to PNG (no alpha)
          sips -s format png /tmp/icon_noalpha.jpg --out "$ICON_DIR/AppIcon-512@2x.png"
          # Verify
          echo "=== Icon verification ==="
          sips -g pixelWidth -g pixelHeight -g hasAlpha "$ICON_DIR/AppIcon-512@2x.png"
          # Ensure Contents.json
          printf '{"images":[{"idiom":"universal","size":"1024x1024","filename":"AppIcon-512@2x.png","platform":"ios"}],"info":{"author":"xcode","version":1}}' > "$ICON_DIR/Contents.json"
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - devalwork07@gmail.com
        notify:
          success: true
          failure: true

